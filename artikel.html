<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Artikel</title>
</head>
<body>
  <div id="konten-artikel">Memuat artikel...</div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    fetch(`/artikel/${id}.md`)
      .then(res => res.text())
      .then(md => {
        document.getElementById('konten-artikel').innerHTML = marked.parse(md);
      })
      .catch(() => {
        document.getElementById('konten-artikel').innerText = 'Artikel tidak ditemukan.';
      });
  </script>
</body>
</html>
