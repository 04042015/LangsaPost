<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin - LangsaPost</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      max-width: 600px;
    }
    input, textarea, select, button {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      background-color: coral;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background-color: darkorange;
    }
  </style>
</head>
<body>
  <h2>Tambah Artikel Baru</h2>
  <form id="formArtikel">
    <label for="kategori">Kategori:</label>
    <select id="kategori" name="kategori" required>
      <option value="Teknologi">Teknologi</option>
      <option value="Olahraga">Olahraga</option>
      <option value="Politik">Politik</option>
      <option value="Hiburan">Hiburan</option>
      <option value="Internasional">Internasional</option>
      <option value="Loker">Loker</option>
    </select>

    <input type="text" id="judul" placeholder="Judul Artikel" required />
    <input type="text" id="tanggal" placeholder="Tanggal (cth: 17 Jun 2025)" required />
    <input type="text" id="gambar" placeholder="URL Gambar" required />
    <textarea id="deskripsi" placeholder="Deskripsi Artikel" required></textarea>

    <button type="submit">Simpan Artikel</button>
  </form>

  <script src="admin.js"></script>
</body>
</html>
