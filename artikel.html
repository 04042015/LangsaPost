<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Detail Artikel - Langsa Post</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="logo">Langsa <span>Post</span></div>
    <a href="index.html">⬅ Kembali</a>
  </header>

  <main>
    <div id="detailArtikel"></div>
  </main>

  <footer>
    <p>&copy; 2025 Langsa Post</p>
  </footer>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const artikelId = urlParams.get("id");

    fetch("artikel.json")
      .then(res => res.json())
      .then(data => {
        const artikel = data[artikelId];
        if (artikel) {
          document.getElementById("detailArtikel").innerHTML = `
            <h2>${artikel.judul}</h2>
            <small>${artikel.tanggal} - ${artikel.kategori}</small>
            <img src="${artikel.gambar}" style="width:100%;margin-top:10px;" />
            <p style="margin-top:20px;">${artikel.deskripsi}</p>
          `;
        } else {
          document.getElementById("detailArtikel").innerHTML = "<p>Artikel tidak ditemukan.</p>";
        }
      });
  </script>

<hr>
<div class="social-follow">
  <p><strong>Ikuti kami di:</strong></p>
  <a class="btn fb" href="https://www.facebook.com/share/1KZ6hqfk3B/" target="_blank">Facebook</a>
  <a class="btn ig" href="https://www.instagram.com/langsapost.id?igsh=NXM4eGZndWRhNWxv" target="_blank">Instagram</a>
  <a class="btn tt" href="https://www.tiktok.com/@langsapost.id?_t=ZS-8xGORNhiJVK&_r=1" target="_blank">TikTok</a>
</div>
<style>
.social-follow {
  margin: 20px 0;
}

.social-follow .btn {
  padding: 8px 15px;
  border-radius: 20px;
  color: white;
  margin-right: 10px;
  text-decoration: none;
  font-weight: bold;
}

.btn.fb { background-color: #3b5998; }
.btn.ig {
  background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
}
.btn.tt { background-color: #000000; }
</style>

</body>
</html>
