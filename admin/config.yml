backend:
  name: git-gateway
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

site_url: https://langsapost.netlify.app

collections:
  - name: "berita"
    label: "Berita"
    folder: "artikel"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Judul", name: "title", widget: "string" }
      - { label: "Tanggal", name: "date", widget: "datetime" }
      - { label: "Kategori", name: "kategori", widget: "select", options: ["Nasional", "Internasional", "Healthy", "Sport", "Zodiak", "Loker"] }
      - { label: "Gambar", name: "image", widget: "image" }
      - { label: "Ringkasan", name: "excerpt", widget: "string" }
      - { label: "Isi Berita", name: "body", widget: "markdown" }
