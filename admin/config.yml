backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "artikel"
    label: "Artikel"
    folder: "artikel"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Judul", name: "title", widget: "string" }
      - { label: "Tanggal", name: "date", widget: "datetime" }
      - { label: "Kategori", name: "kategori", widget: "select", options: ["Teknologi", "Olahraga", "Politik", "Hiburan", "Internasional", "Loker"] }
      - { label: "Gambar", name: "gambar", widget: "image" }
      - { label: "Isi", name: "body", widget: "markdown" }