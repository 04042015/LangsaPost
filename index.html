<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Langsapost - Berita Terkini</title>
  <link rel="icon" href="assets/images/logo-LangsaPost.png" type="image/png">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

  <!-- Header -->
  <header class="bg-[#F0493E] shadow p-4">
    <div class="container mx-auto flex justify-between items-center text-white">
      <a href="index.html">
        <img src="assets/images/logo-LangsaPost.png" alt="Langsapost Logo" class="h-10">
      </a>
      <nav class="space-x-4 font-medium">
        <a href="kategori/nasional.html" class="hover:underline">Nasional</a>
        <a href="kategori/internasional.html" class="hover:underline">Internasional</a>
        <a href="kategori/healthy.html" class="hover:underline">Healthy</a>
        <a href="kategori/sport.html" class="hover:underline">Sport</a>
        <a href="kategori/zodiak.html" class="hover:underline">Zodiak</a>
        <a href="kategori/loker.html" class="hover:underline">Loker</a>
      </nav>
    </div>
  </header>

  <main class="container mx-auto p-4 grid md:grid-cols-3 gap-6">
    <a href="artikel/contoh-artikel.html" class="bg-white shadow rounded overflow-hidden hover:shadow-md transition">
      <img src="assets/images/thumb.jpg" alt="Gambar Berita" class="w-full h-48 object-cover" />
      <div class="p-4">
        <h2 class="font-semibold text-lg text-[#F0493E]">Judul Berita Utama</h2>
        <p class="text-sm text-gray-500 mt-1">Kategori: Nasional • 20 Juni 2025</p>
        <p class="text-gray-600 mt-2">Ringkasan singkat isi artikel berita ini...</p>
      </div>
    </a>
  </main>

  <footer class="bg-white p-4 text-center text-sm text-gray-500 mt-10">
    &copy; 2025 Langsapost. All rights reserved.
    <div class="mt-2">
      <span>Follow kami: </span>
      <a href="https://facebook.com/langsapost" class="text-blue-600">Facebook</a> |
      <a href="https://instagram.com/langsapost.id" class="text-pink-600">Instagram</a>
    </div>
  </footer>

  <!-- CMS & Login Script -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", function(user) {
        if (!user) {
          window.netlifyIdentity.on("login", function() {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
