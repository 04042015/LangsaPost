<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>LangsaPost</title>
</head>
<body>
  <h1>Selamat datang di LangsaPost</h1>
  <ul id="daftar-artikel"></ul>

  <script>
    fetch('/artikel/index.json')
      .then(res => res.json())
      .then(data => {
        const list = document.getElementById('daftar-artikel');
        data.forEach(item => {
          const li = document.createElement('li');
          li.innerHTML = `<a href="artikel.html?id=${item.slug}">${item.title}</a>`;
          list.appendChild(li);
        });
      })
      .catch(err => console.error('Gagal memuat artikel:', err));
  </script>
</body>
</html>
